name: TrendRadar Auto Run

on:
  push:
    branches: [ main ]
  schedule:
    # 每50分钟执行一次 北京时间定时
    - cron: '*/50 * * * *'
  workflow_dispatch: # 支持手动点按钮触发

permissions:
  contents: read
  write-all: true

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run TrendRadar
        run: node index.js

      - name: Commit & Push report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update radar report" || echo "No changes to commit"
          git push
